<ion-content>
  <div class="home-container">

    <div class="top-bar">
      <ion-button fill="clear" class="back-btn" (click)="goBack()">
        <ion-icon name="chevron-back-outline"></ion-icon> Back
      </ion-button>
      <ion-button fill="clear" class="more-btn">
        <ion-icon name="ellipsis-vertical-outline"></ion-icon>
      </ion-button>
    </div>

    <div class="app-main-title-box">
      <div class="app-logo-icon">
        <span class="phone-emoji">📱</span>
      </div>
      <div>
        <div class="app-title-text">TD Mobile POS</div>
        <div class="app-company-text">B JAYA TRADING</div>
      </div>
    </div>

    <div class="header">
      <p class="section-label">BUSINESS</p>
      <h1>Operations based on<br><strong>your records</strong></h1>
    </div>

    <div class="cards-grid">

      <!-- Row 1: Stock Report (wide) + Stock Move (small) -->
      <div class="row-one">
        <div class="card card-stock-report" (click)="goTo('pages/invoices')">
          <span class="card-title-center">Stock Report</span>
          <div class="icon-bubble icon-bubble-center">
            <ion-icon name="cube-outline" class="icon-mono icon-blue"></ion-icon>
          </div>
        </div>

        <div class="card card-stock-move" (click)="goTo('pages/invoices')">
          <span class="card-title-small">STOCK<br>MOVE</span>
          <div class="icon-bubble icon-bubble-center">
            <ion-icon name="swap-horizontal-outline" class="icon-mono icon-orange"></ion-icon>
          </div>
        </div>
      </div>

      <!-- Row 2: Item Group + Product -->
      <div class="row-two">
        <div class="card card-half" (click)="goTo('pages/add-product')">
          <span class="card-title-center">ITEM<br>GROUP</span>
          <div class="icon-bubble icon-bubble-center">
            <ion-icon name="layers-outline" class="icon-mono icon-gray"></ion-icon>
          </div>
        </div>

        <div class="card card-half" (click)="goTo('pages/products')">
          <span class="card-title-center">PRODUCT</span>
          <div class="icon-bubble icon-bubble-center">
            <ion-icon name="cube-outline" class="icon-mono icon-gray"></ion-icon>
          </div>
        </div>
      </div>

      <!-- Row 3: Customer Category + Customer -->
      <div class="row-two">
        <div class="card card-half" (click)="goTo('pages/customer-detail')">
          <span class="card-title-center">CUSTOMER<br>CATEGORY</span>
          <div class="icon-bubble icon-bubble-center">
            <ion-icon name="people-outline" class="icon-mono icon-gray"></ion-icon>
          </div>
        </div>

        <div class="card card-half" (click)="goTo('pages/customers')">
          <span class="card-title-center">CUSTOMER</span>
          <div class="icon-bubble icon-bubble-center">
            <ion-icon name="person-circle-outline" class="icon-mono icon-gray"></ion-icon>
          </div>
        </div>
      </div>

    </div>
  </div>
</ion-content>
